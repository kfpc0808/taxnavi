<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaxNavi Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyCf7CsUTgfIWY-RW_mvTJOhczDtk1xM9sA",
  authDomain:"kfpc-company-support-project.firebaseapp.com",
  projectId:"kfpc-company-support-project",
  storageBucket:"kfpc-company-support-project.firebasestorage.app",
  messagingSenderId:"1012609333373",
  appId:"1:1012609333373:web:0ebceb27e5d2f12b56d914"
});
const API = 'https://taxnavi-backend-1012609333373.asia-northeast3.run.app';
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#F1F3F8;color:#1A1A2E;min-height:100vh}
a{text-decoration:none;color:inherit}

/* NAV */
.nav{background:#0D1B2A;color:white;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nav-logo{font-weight:800;font-size:18px;display:flex;align-items:center;gap:8px}
.nav-logo span{color:#E8A838}
.nav-user{font-size:13px;color:#8A95A5;display:flex;align-items:center;gap:12px}
.nav-user button{padding:6px 14px;background:#1B3A5C;color:white;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer}

/* TABS */
.tabs{background:white;border-bottom:1px solid #E2E8F0;padding:0 24px;display:flex;gap:4px}
.tab{padding:14px 20px;font-size:14px;font-weight:600;color:#8A95A5;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s}
.tab:hover{color:#1B3A5C}
.tab.active{color:#1B3A5C;border-bottom-color:#1B3A5C}

/* MAIN */
.main{max-width:1300px;margin:0 auto;padding:24px}

/* CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.stat-card{background:white;border-radius:14px;padding:22px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.stat-label{font-size:12px;color:#8A95A5;font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.stat-value{font-size:32px;font-weight:800;color:#1B3A5C}
.stat-sub{font-size:12px;color:#8A95A5;margin-top:4px}
.stat-card.accent .stat-value{color:#E8A838}
.stat-card.green .stat-value{color:#22C55E}

/* TABLE */
.panel{background:white;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:24px;overflow:hidden}
.panel-header{padding:18px 22px;border-bottom:1px solid #F0F3F7;display:flex;align-items:center;justify-content:space-between}
.panel-header h3{font-size:16px;font-weight:700}
.panel-header .badge{font-size:11px;padding:3px 10px;background:#EEF4FF;color:#1B3A5C;border-radius:20px;font-weight:700}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:#F8FAFC;padding:10px 14px;text-align:left;font-weight:600;color:#5A6577;border-bottom:1px solid #E2E8F0;white-space:nowrap}
tbody td{padding:10px 14px;border-bottom:1px solid #F0F3F7;color:#333}
tbody tr:hover{background:#FAFBFD}
.tier-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700}
.tier-free{background:#F0F3F7;color:#8A95A5}
.tier-basic{background:#EEF4FF;color:#1B3A5C}
.tier-pro{background:#FEF3C7;color:#92400E}
.tier-enterprise{background:#DCFCE7;color:#166534}
.err-badge{background:#FEF0F0;color:#B91C1C;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700}

/* CHART placeholder */
.chart-area{padding:22px;min-height:200px;display:flex;align-items:flex-end;gap:4px}
.chart-bar{background:#1B3A5C;border-radius:4px 4px 0 0;flex:1;min-width:20px;transition:height .3s;position:relative}
.chart-bar:hover{background:#2A5A8C}
.chart-bar-label{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:700;color:#1B3A5C;white-space:nowrap}
.chart-bar-date{text-align:center;font-size:9px;color:#8A95A5;margin-top:4px}

/* SECTION TOGGLE */
.section{display:none}
.section.active{display:block}

/* AUTH */
.auth-wall{display:flex;align-items:center;justify-content:center;min-height:80vh;flex-direction:column;gap:16px}
.auth-wall h2{font-size:24px;font-weight:800;color:#1B3A5C}
.auth-wall p{font-size:14px;color:#8A95A5}
.auth-wall button{padding:12px 32px;background:#1B3A5C;color:white;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer}

/* LOADING */
.loading{text-align:center;padding:40px;color:#8A95A5;font-size:14px}

/* RESPONSIVE */
@media(max-width:900px){.stat-grid{grid-template-columns:repeat(2,1fr)}.main{padding:16px}table{font-size:12px}}
@media(max-width:600px){.stat-grid{grid-template-columns:1fr}.tabs{overflow-x:auto}.tab{white-space:nowrap;font-size:13px;padding:12px 14px}}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">Tax<span>Navi</span> Admin</div>
  <div class="nav-user">
    <span id="adminEmail"></span>
    <button onclick="firebase.auth().signOut()">로그아웃</button>
    <button onclick="location.href='/'">사이트 보기</button>
  </div>
</nav>

<!-- Auth Wall -->
<div id="authWall" class="auth-wall">
  <h2>🔒 관리자 로그인</h2>
  <p>관리자 권한이 있는 계정으로 로그인하세요</p>
  <button onclick="doAdminLogin()">Google 로그인</button>
  <div style="margin-top:12px;display:flex;gap:8px;align-items:center">
    <input id="al-email" placeholder="이메일" style="padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:14px;width:200px">
    <input id="al-pw" type="password" placeholder="비밀번호" style="padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:14px;width:160px">
    <button onclick="doEmailLogin()" style="padding:10px 20px;background:#1B3A5C;color:white;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer">로그인</button>
  </div>
  <p id="authErr" style="color:#EF4444;font-size:13px"></p>
</div>

<!-- Admin Content -->
<div id="adminContent" style="display:none">
  <div class="tabs">
    <div class="tab active" onclick="showTab('dashboard')">📊 대시보드</div>
    <div class="tab" onclick="showTab('users')">👥 회원 관리</div>
    <div class="tab" onclick="showTab('searchLogs')">🔍 검색 로그</div>
    <div class="tab" onclick="showTab('loginLogs')">🔑 로그인 로그</div>
  </div>

  <div class="main">
    <!-- DASHBOARD -->
    <div id="sec-dashboard" class="section active">
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-label">오늘 검색</div><div class="stat-value" id="st-today-search">-</div><div class="stat-sub" id="st-today-results">결과 -건</div></div>
        <div class="stat-card accent"><div class="stat-label">오늘 신규가입</div><div class="stat-value" id="st-today-signup">-</div><div class="stat-sub" id="st-today-active">활성 -명</div></div>
        <div class="stat-card"><div class="stat-label">주간 검색</div><div class="stat-value" id="st-week-search">-</div></div>
        <div class="stat-card green"><div class="stat-label">전체 회원</div><div class="stat-value" id="st-total-users">-</div><div class="stat-sub" id="st-tier-breakdown">무료 - / 베이직 - / 프로 -</div></div>
      </div>
      <div class="panel">
        <div class="panel-header"><h3>주간 검색 추이</h3></div>
        <div class="chart-area" id="weekChart"></div>
      </div>
    </div>

    <!-- USERS -->
    <div id="sec-users" class="section">
      <div class="panel">
        <div class="panel-header"><h3>회원 목록</h3><span class="badge" id="userCount">0명</span></div>
        <div style="overflow-x:auto">
          <table>
            <thead><tr><th>이름</th><th>아이디</th><th>전화번호</th><th>등급</th><th>총검색</th><th>마지막검색</th><th>가입일</th><th>JARVIA</th><th>관리</th></tr></thead>
            <tbody id="usersTable"><tr><td colspan="9" class="loading">로딩 중...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- SEARCH LOGS -->
    <div id="sec-searchLogs" class="section">
      <div class="panel">
        <div class="panel-header"><h3>검색 로그</h3><span class="badge">최근 50건</span></div>
        <div style="overflow-x:auto">
          <table>
            <thead><tr><th>시간</th><th>이메일</th><th>검색어</th><th>키워드</th><th>의도</th><th>사이트</th><th>결과</th><th>AI답변</th><th>소요</th><th>등급</th></tr></thead>
            <tbody id="searchLogsTable"><tr><td colspan="10" class="loading">로딩 중...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- LOGIN LOGS -->
    <div id="sec-loginLogs" class="section">
      <div class="panel">
        <div class="panel-header"><h3>로그인 로그</h3><span class="badge">최근 50건</span></div>
        <div style="overflow-x:auto">
          <table>
            <thead><tr><th>시간</th><th>이메일</th><th>IP</th></tr></thead>
            <tbody id="loginLogsTable"><tr><td colspan="3" class="loading">로딩 중...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let token = null;

// ── Auth ──
const ADMIN_EMAILS = ['polarislkh@gmail.com','kfpc0808@gmail.com'];

firebase.auth().onAuthStateChanged(async user => {
  if (user && ADMIN_EMAILS.includes(user.email)) {
    token = await user.getIdToken();
    document.getElementById('authWall').style.display = 'none';
    document.getElementById('adminContent').style.display = 'block';
    document.getElementById('adminEmail').textContent = user.email;
    loadDashboard();
  } else {
    document.getElementById('authWall').style.display = 'flex';
    document.getElementById('adminContent').style.display = 'none';
    if (user && !ADMIN_EMAILS.includes(user.email)) {
      document.getElementById('authErr').textContent = '관리자 권한이 없는 계정입니다: ' + user.email;
      firebase.auth().signOut();
    }
  }
});

function doEmailLogin() {
  const email = document.getElementById('al-email').value.trim();
  const pw = document.getElementById('al-pw').value;
  firebase.auth().signInWithEmailAndPassword(email, pw)
    .catch(err => document.getElementById('authErr').textContent = '로그인 실패: ' + err.message);
}
function doAdminLogin() {
  const provider = new firebase.auth.GoogleAuthProvider();
  firebase.auth().signInWithPopup(provider)
    .catch(err => document.getElementById('authErr').textContent = err.message);
}

// ── Tabs ──
function showTab(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('sec-' + name).classList.add('active');
  event.target.classList.add('active');
  
  if (name === 'dashboard') loadDashboard();
  if (name === 'users') loadUsers();
  if (name === 'searchLogs') loadSearchLogs();
  if (name === 'loginLogs') loadLoginLogs();
}

// ── API Call Helper ──
async function api(path) {
  const resp = await fetch(API + path, { headers: { 'Authorization': 'Bearer ' + token } });
  if (!resp.ok) throw new Error('API Error ' + resp.status);
  return resp.json();
}
async function apiPost(path, body) {
  const resp = await fetch(API + path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify(body),
  });
  return resp.json();
}

// ── Dashboard ──
async function loadDashboard() {
  try {
    const d = await api('/api/admin/dashboard');
    document.getElementById('st-today-search').textContent = (d.today.searches || 0).toLocaleString();
    document.getElementById('st-today-results').textContent = '결과 ' + (d.today.results || 0).toLocaleString() + '건';
    document.getElementById('st-today-signup').textContent = d.today.newUsers || 0;
    document.getElementById('st-today-active').textContent = '활성 ' + (d.today.activeUsers || 0) + '명';
    document.getElementById('st-week-search').textContent = (d.week.searches || 0).toLocaleString();
    document.getElementById('st-total-users').textContent = (d.users.total || 0).toLocaleString();
    document.getElementById('st-tier-breakdown').textContent = 
      '무료 ' + d.users.free + ' / 베이직 ' + d.users.basic + ' / 프로 ' + d.users.pro;
    
    // Chart
    const chart = document.getElementById('weekChart');
    chart.innerHTML = '';
    const maxCount = Math.max(...(d.week.chart || []).map(c => c.count), 1);
    (d.week.chart || []).forEach(c => {
      const h = Math.max((c.count / maxCount) * 160, 4);
      const col = document.createElement('div');
      col.style.flex = '1';
      col.innerHTML = `<div class="chart-bar" style="height:${h}px"><span class="chart-bar-label">${c.count}</span></div><div class="chart-bar-date">${c.date.substring(5)}</div>`;
      chart.appendChild(col);
    });
  } catch (err) {
    console.error('Dashboard error:', err);
  }
}

// ── Users ──
async function loadUsers() {
  try {
    const d = await api('/api/admin/users?limit=100');
    document.getElementById('userCount').textContent = d.count + '명';
    const tb = document.getElementById('usersTable');
    if (!d.users.length) { tb.innerHTML = '<tr><td colspan="9" class="loading">회원이 없습니다</td></tr>'; return; }
    tb.innerHTML = d.users.map(u => `<tr>
      <td><strong>${u.name||'-'}</strong></td>
      <td>${u.loginId||u.email||'-'}</td>
      <td>${u.phone||'-'}</td>
      <td><span class="tier-badge tier-${u.tier}">${u.tier}</span></td>
      <td>${u.totalSearches||0}</td>
      <td>${u.lastSearchAt ? fmtTime(u.lastSearchAt) : '-'}</td>
      <td>${u.createdAt ? fmtTime(u.createdAt) : '-'}</td>
      <td>${u.jarviaLinked ? '✅' : '-'}</td>
      <td>
        <select onchange="updateTier('${u.uid}',this.value)" style="padding:4px 8px;border:1px solid #ddd;border-radius:4px;font-size:12px">
          <option ${u.tier==='free'?'selected':''}>free</option>
          <option ${u.tier==='basic'?'selected':''}>basic</option>
          <option ${u.tier==='pro'?'selected':''}>pro</option>
          <option ${u.tier==='enterprise'?'selected':''}>enterprise</option>
        </select>
      </td>
    </tr>`).join('');
  } catch (err) {
    document.getElementById('usersTable').innerHTML = '<tr><td colspan="9" class="loading">오류: '+err.message+'</td></tr>';
  }
}

async function updateTier(uid, tier) {
  try {
    await apiPost('/api/admin/update-user', { uid, tier });
    alert('등급 변경 완료: ' + tier);
  } catch (err) { alert('실패: ' + err.message); }
}

// ── Search Logs ──
async function loadSearchLogs() {
  try {
    const d = await api('/api/admin/search-logs?limit=50');
    const tb = document.getElementById('searchLogsTable');
    if (!d.logs.length) { tb.innerHTML = '<tr><td colspan="10" class="loading">로그가 없습니다</td></tr>'; return; }
    tb.innerHTML = d.logs.map(l => `<tr>
      <td style="white-space:nowrap">${l.createdAt ? fmtTime(l.createdAt) : '-'}</td>
      <td>${l.email||'-'}</td>
      <td><strong>${l.question||'-'}</strong></td>
      <td>${l.keywords||'-'}</td>
      <td>${l.intent||'-'}</td>
      <td>${(l.sites||[]).join(', ')}</td>
      <td>${l.error ? '<span class="err-badge">에러</span>' : l.resultCount+'건'}</td>
      <td>${l.hasAnswer?'✅':'-'}</td>
      <td>${l.duration?l.duration+'s':'-'}</td>
      <td><span class="tier-badge tier-${l.tier}">${l.tier}</span></td>
    </tr>`).join('');
  } catch (err) {
    document.getElementById('searchLogsTable').innerHTML = '<tr><td colspan="10" class="loading">오류: '+err.message+'</td></tr>';
  }
}

// ── Login Logs ──
async function loadLoginLogs() {
  try {
    const d = await api('/api/admin/login-logs?limit=50');
    const tb = document.getElementById('loginLogsTable');
    if (!d.logs.length) { tb.innerHTML = '<tr><td colspan="3" class="loading">로그가 없습니다</td></tr>'; return; }
    tb.innerHTML = d.logs.map(l => `<tr>
      <td style="white-space:nowrap">${l.createdAt ? fmtTime(l.createdAt) : '-'}</td>
      <td>${l.email||'-'}</td>
      <td>${l.ip||'-'}</td>
    </tr>`).join('');
  } catch (err) {
    document.getElementById('loginLogsTable').innerHTML = '<tr><td colspan="3" class="loading">오류: '+err.message+'</td></tr>';
  }
}

// ── Helpers ──
function fmtTime(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  const hh = String(d.getHours()).padStart(2,'0');
  const mi = String(d.getMinutes()).padStart(2,'0');
  return mm+'/'+dd+' '+hh+':'+mi;
}
</script>
</body>
</html>
